<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Tareas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Gestión de Tareas</h1>
            <p class="subtitle">Organiza tus tareas fácilmente</p>
        </header>

        <main class="task-container">
            <div class="input-section">
                <input 
                    type="text" 
                    id="taskInput" 
                    placeholder="Ingrese una nueva tarea"
                    autocomplete="off"
                >
                <button id="addTaskButton">+ Agregar</button>
            </div>

            <div class="task-stats">
                <span>Total: <strong id="totalTasks">0</strong></span>
                <span>Completadas: <strong id="completedTasks">0</strong></span>
                <span>Pendientes: <strong id="pendingTasks">0</strong></span>
            </div>

            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">Todas</button>
                <button class="filter-btn" data-filter="pending">Pendientes</button>
                <button class="filter-btn" data-filter="completed">Completadas</button>
            </div>

            <ul id="taskList" class="task-list"></ul>

            <div id="emptyState" class="empty-state">
                <p>No hay tareas. ¡Crea una nueva!</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
